<style>
  :root{
    --paper:#E3DCC8;
    --card:#FBF8F1;
    --ink:#2B2A28;
    --muted:#85795F;
    --green:#2F6B4F;
    --green-dark:#234F3B;
    --price:#B33A3A;
    --line:#C9BFA6;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:28px 14px 70px;
    -webkit-tap-highlight-color: transparent;
  }
  .page{ width:100%; max-width:430px; }

  .receipt{
    position:relative;
    background:var(--card);
    border-radius:3px;
    box-shadow:0 22px 44px -24px rgba(43,42,40,.45), 0 2px 6px rgba(43,42,40,.10);
    padding:32px 22px 26px;
    margin-top:16px;
  }
  .tear{
    position:absolute; top:-13px; left:0; right:0; height:15px;
    background:var(--card);
    clip-path: polygon(0% 100%, 0% 28%, 6.25% 100%, 12.5% 28%, 18.75% 100%, 25% 28%, 31.25% 100%, 37.5% 28%, 43.75% 100%, 50% 28%, 56.25% 100%, 62.5% 28%, 68.75% 100%, 75% 28%, 81.25% 100%, 87.5% 28%, 93.75% 100%, 100% 28%, 100% 100%);
  }

  .eyebrow{
    font-family:'Space Mono',monospace;
    font-size:11px; letter-spacing:.16em; font-weight:700;
    color:var(--green); text-transform:uppercase;
  }
  .month-row{ display:flex; align-items:baseline; justify-content:space-between; margin-top:8px; }
  h1#monthLabel{ font-family:'Space Mono',monospace; font-size:21px; font-weight:700; margin:0; letter-spacing:.01em; }

  #syncBtn{
    background:none; border:1.5px solid var(--line); width:34px; height:34px; border-radius:50%;
    font-size:16px; color:var(--green-dark); cursor:pointer; flex-shrink:0; line-height:1;
  }
  #syncBtn:active{ transform:scale(.93); background:var(--paper); }
  #syncBtn.spinning{ animation: spin .6s linear; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .total-block{ margin-top:20px; }
  .total-label{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; }
  .total-amount{ font-family:'Space Mono',monospace; font-size:46px; font-weight:700; color:var(--price); line-height:1.05; margin-top:3px; }
  .total-sub{ font-size:12px; color:var(--muted); margin-top:4px; }

  .divider{ border:none; border-top:2px dashed var(--line); margin:22px 0; }

  .field{ margin-bottom:14px; }
  label.small{ display:block; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; font-weight:600; }

  .amount-wrap{ display:flex; align-items:center; border:1.5px solid var(--line); border-radius:8px; background:#fff; padding:0 12px; }
  .amount-wrap span{ font-family:'Space Mono',monospace; font-weight:700; color:var(--ink); margin-right:2px; }
  .amount-wrap input{ border:none; outline:none; flex:1; font-family:'Space Mono',monospace; font-size:20px; padding:12px 2px; background:transparent; color:var(--ink); width:100%; }

  select, input[type=date], input[type=text]{
    width:100%; border:1.5px solid var(--line); border-radius:8px; padding:12px;
    font-family:'Inter',sans-serif; font-size:16px; background:#fff; color:var(--ink);
    -webkit-appearance:none; appearance:none;
  }
  select{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='9'><path d='M1 1l6 6 6-6' stroke='%2385795F' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");
    background-repeat:no-repeat; background-position:right 14px center;
  }

  button[type=submit]{
    width:100%; background:var(--green); color:#fff; border:none; border-radius:8px;
    padding:15px; font-family:'Inter'; font-weight:700; font-size:15px; letter-spacing:.02em;
    cursor:pointer; margin-top:6px;
  }
  button[type=submit]:active{ background:var(--green-dark); }

  .error-msg{ color:var(--price); font-size:13px; margin-top:10px; font-weight:600; display:none; }
  .banner{
    display:none; background:#F4E3D6; border:1.5px solid var(--price); color:var(--price);
    font-size:13px; font-weight:600; padding:10px 12px; border-radius:8px; margin-bottom:16px;
  }

  .entries{ }
  .entry-row{ display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px solid var(--line); }
  .entry-row:last-child{ border-bottom:none; }
  .entry-left .shop{ font-weight:600; font-size:15px; }
  .entry-left .date{ font-size:12px; color:var(--muted); margin-top:2px; font-family:'Space Mono',monospace; }
  .entry-right{ display:flex; align-items:center; gap:12px; }
  .entry-amount{ font-family:'Space Mono',monospace; font-weight:700; font-size:16px; }
  .del-btn{ border:none; background:none; color:var(--muted); font-size:12px; cursor:pointer; padding:6px 4px; font-family:'Inter'; font-weight:600; }
  .del-btn.confirm{ color:var(--price); }

  @media (prefers-reduced-motion: no-preference){
    .entry-row.new{ animation: slideIn .28s ease; }
  }
  @keyframes slideIn{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }

  .empty-state{ font-size:14px; color:var(--muted); padding:18px 0; text-align:center; display:none; }

  details#prevMonths{ margin-top:18px; }
  details#prevMonths summary{
    font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.06em; color:var(--green-dark);
    cursor:pointer; list-style:none; font-weight:700; text-transform:uppercase;
  }
  details#prevMonths summary::-webkit-details-marker{ display:none; }
  details#prevMonths summary::before{ content:"▸ "; }
  details#prevMonths[open] summary::before{ content:"▾ "; }
  .prev-month-group{ margin-top:14px; }
  .prev-month-head{ display:flex; justify-content:space-between; font-weight:700; font-size:13px; margin-bottom:4px; }
  .prev-month-head .amt{ font-family:'Space Mono',monospace; color:var(--price); }
  .prev-entry{ display:flex; justify-content:space-between; font-size:12.5px; color:var(--muted); padding:3px 0; }
  .prev-entry span.amt{ font-family:'Space Mono',monospace; }

  .footer-note{ text-align:center; font-size:11.5px; color:var(--muted); margin-top:22px; line-height:1.5; }
</style>
</head>
<body>

<div class="page">
  <div class="receipt">
    <div class="tear"></div>

    <div class="eyebrow">Grocery Ledger</div>
    <div class="month-row">
      <h1 id="monthLabel">—</h1>
      <button id="syncBtn" type="button" title="Sync with shared ledger">↻</button>
    </div>

    <div class="total-block">
      <div class="total-label">Total this month</div>
      <div class="total-amount" id="totalAmount">£0</div>
      <div class="total-sub" id="syncStatus">Loading…</div>
    </div>

    <hr class="divider" />

    <div class="banner" id="errorBanner"></div>

    <form id="entryForm">
      <div class="field">
        <label class="small" for="amountInput">Amount</label>
        <div class="amount-wrap">
          <span>£</span>
          <input type="number" id="amountInput" inputmode="numeric" min="0" step="1" placeholder="0" />
        </div>
      </div>

      <div class="field">
        <label class="small" for="shopSelect">Shop</label>
        <select id="shopSelect">
          <option value="">Choose a shop…</option>
          <option>Tesco</option>
          <option>Sainsbury's</option>
          <option>Asda</option>
          <option>Morrisons</option>
          <option>Aldi</option>
          <option>Lidl</option>
          <option>Waitrose</option>
          <option>Co-op</option>
          <option>M&amp;S Food</option>
          <option>Iceland</option>
          <option value="Other">Other…</option>
        </select>
      </div>

      <div class="field" id="customShopField" style="display:none;">
        <label class="small" for="customShopInput">Shop name</label>
        <input type="text" id="customShopInput" placeholder="Type the shop name" />
      </div>

      <div class="field">
        <label class="small" for="dateInput">Date</label>
        <input type="date" id="dateInput" />
      </div>

      <button type="submit">Add to ledger</button>
      <div class="error-msg" id="formError"></div>
    </form>

    <hr class="divider" />

    <div class="entries" id="entriesList"></div>
    <div class="empty-state" id="emptyState">No spends logged yet this month. Add your first one above.</div>

    <details id="prevMonths">
      <summary>Previous months</summary>
      <div id="prevList"></div>
    </details>

    <div class="footer-note" id="footerNote">Shared ledger — visible to both of you.</div>
  </div>
</div>

<script>
  // ── ONE-TIME SETUP ───────────────────────────────────────────────
  // Paste your Firebase Realtime Database URL below, e.g.
  // "https://grocery-ledger-1234-default-rtdb.europe-west1.firebasedatabase.app"
  // See the setup guide for how to get this — it takes about 10 minutes
  // and is completely free.
  const FIREBASE_DB_URL = "https://grocery-tracking-e7651-default-rtdb.firebaseio.com";
  // ─────────────────────────────────────────────────────────────────

  const SHOP_OTHER = 'Other';
  let entries = [];
  const isConfigured = () => FIREBASE_DB_URL && !FIREBASE_DB_URL.includes('YOUR_FIREBASE');

  const $ = (id) => document.getElementById(id);
  const monthLabelEl = $('monthLabel');
  const totalAmountEl = $('totalAmount');
  const syncStatusEl = $('syncStatus');
  const entriesListEl = $('entriesList');
  const emptyStateEl = $('emptyState');
  const prevListEl = $('prevList');
  const errorBannerEl = $('errorBanner');
  const formErrorEl = $('formError');
  const syncBtn = $('syncBtn');
  const form = $('entryForm');
  const amountInput = $('amountInput');
  const shopSelect = $('shopSelect');
  const customShopField = $('customShopField');
  const customShopInput = $('customShopInput');
  const dateInput = $('dateInput');

  function todayStr(){
    const d = new Date();
    const tz = d.getTimezoneOffset() * 60000;
    return new Date(d - tz).toISOString().slice(0,10);
  }
  function currentMonthKey(){ return todayStr().slice(0,7); }
  function monthKeyOf(dateStr){ return (dateStr || '').slice(0,7); }
  function monthLabelFor(key){
    const [y,m] = key.split('-').map(Number);
    const d = new Date(y, m-1, 1);
    return d.toLocaleString('en-GB',{month:'long'}).toUpperCase() + ' ' + y;
  }
  function fmtDate(dateStr){
    const [y,m,d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    return dt.toLocaleDateString('en-GB',{ day:'2-digit', month:'short' });
  }
  function fmtMoney(n){ return '£' + Math.round(n).toLocaleString('en-GB'); }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  function showBanner(msg){ errorBannerEl.textContent = msg; errorBannerEl.style.display = 'block'; }
  function hideBanner(){ errorBannerEl.style.display = 'none'; }

  async function fetchLatest(){
    const res = await fetch(`${FIREBASE_DB_URL}/entries.json`);
    if (!res.ok) throw new Error('Database request failed');
    const data = await res.json();
    return Array.isArray(data) ? data.filter(Boolean) : (data ? Object.values(data) : []);
  }
  async function persist(list){
    const res = await fetch(`${FIREBASE_DB_URL}/entries.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(list)
    });
    if (!res.ok) throw new Error('Database save failed');
  }

  async function loadAndRender(spin){
    if (!isConfigured()){
      showBanner("Setup needed: open this file and paste your free database link where it says FIREBASE_DB_URL. See the setup guide for the 10-minute walkthrough.");
      render();
      return;
    }
    if (spin) syncBtn.classList.add('spinning');
    try{
      entries = await fetchLatest();
      hideBanner();
      syncStatusEl.textContent = 'Synced ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    }catch(e){
      showBanner("Couldn't reach the shared ledger. Check your connection and tap ↻ to try again.");
    }
    render();
    setTimeout(() => syncBtn.classList.remove('spinning'), 600);
  }

  function render(){
    const mk = currentMonthKey();
    monthLabelEl.textContent = monthLabelFor(mk);

    const thisMonth = entries.filter(e => monthKeyOf(e.date) === mk)
                              .sort((a,b) => (b.date+b.createdAt).localeCompare(a.date+a.createdAt));
    const total = thisMonth.reduce((s,e) => s + e.amount, 0);
    totalAmountEl.textContent = fmtMoney(total);

    entriesListEl.innerHTML = '';
    if (thisMonth.length === 0){
      emptyStateEl.style.display = 'block';
    } else {
      emptyStateEl.style.display = 'none';
      thisMonth.forEach(e => entriesListEl.appendChild(buildRow(e)));
    }

    renderPrevMonths(mk);
  }

  function buildRow(e, isNew){
    const row = document.createElement('div');
    row.className = 'entry-row' + (isNew ? ' new' : '');
    row.innerHTML = `
      <div class="entry-left">
        <div class="shop"></div>
        <div class="date"></div>
      </div>
      <div class="entry-right">
        <div class="entry-amount"></div>
        <button type="button" class="del-btn">Remove</button>
      </div>`;
    row.querySelector('.shop').textContent = e.shop;
    row.querySelector('.date').textContent = fmtDate(e.date);
    row.querySelector('.entry-amount').textContent = fmtMoney(e.amount);

    const delBtn = row.querySelector('.del-btn');
    let confirmTimer = null;
    delBtn.addEventListener('click', () => {
      if (delBtn.classList.contains('confirm')){
        clearTimeout(confirmTimer);
        deleteEntry(e.id);
      } else {
        delBtn.classList.add('confirm');
        delBtn.textContent = 'Tap again to remove';
        confirmTimer = setTimeout(() => {
          delBtn.classList.remove('confirm');
          delBtn.textContent = 'Remove';
        }, 2800);
      }
    });
    return row;
  }

  function renderPrevMonths(currentKey){
    const groups = {};
    entries.forEach(e => {
      const k = monthKeyOf(e.date);
      if (k === currentKey || !k) return;
      (groups[k] = groups[k] || []).push(e);
    });
    const keys = Object.keys(groups).sort().reverse();
    prevListEl.innerHTML = '';
    if (keys.length === 0){
      prevListEl.innerHTML = '<div style="font-size:12.5px;color:var(--muted);padding-top:6px;">Nothing logged before this month yet.</div>';
      return;
    }
    keys.forEach(k => {
      const list = groups[k].sort((a,b) => (b.date+b.createdAt).localeCompare(a.date+a.createdAt));
      const total = list.reduce((s,e) => s + e.amount, 0);
      const wrap = document.createElement('div');
      wrap.className = 'prev-month-group';
      const head = document.createElement('div');
      head.className = 'prev-month-head';
      head.innerHTML = `<span>${monthLabelFor(k)}</span><span class="amt">${fmtMoney(total)}</span>`;
      wrap.appendChild(head);
      list.forEach(e => {
        const r = document.createElement('div');
        r.className = 'prev-entry';
        r.innerHTML = `<span>${e.shop} — ${fmtDate(e.date)}</span><span class="amt">${fmtMoney(e.amount)}</span>`;
        wrap.appendChild(r);
      });
      prevListEl.appendChild(wrap);
    });
  }

  async function deleteEntry(id){
    if (!isConfigured()){
      showBanner("Setup needed: paste your free database link into FIREBASE_DB_URL first.");
      return;
    }
    try{
      const latest = await fetchLatest();
      const updated = latest.filter(e => e.id !== id);
      await persist(updated);
      entries = updated;
      render();
    }catch(e){
      showBanner("Couldn't remove that — check your connection and try again.");
    }
  }

  shopSelect.addEventListener('change', () => {
    customShopField.style.display = shopSelect.value === SHOP_OTHER ? 'block' : 'none';
  });

  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    formErrorEl.style.display = 'none';

    if (!isConfigured()){
      formErrorEl.textContent = 'Setup needed first — paste your free database link into FIREBASE_DB_URL.';
      formErrorEl.style.display = 'block';
      return;
    }

    const rawAmount = parseFloat(amountInput.value);
    const shopValue = shopSelect.value === SHOP_OTHER ? customShopInput.value.trim() : shopSelect.value;
    const dateValue = dateInput.value || todayStr();

    if (!rawAmount || rawAmount <= 0){
      formErrorEl.textContent = 'Add an amount before saving.';
      formErrorEl.style.display = 'block';
      return;
    }
    if (!shopValue){
      formErrorEl.textContent = 'Choose where you shopped.';
      formErrorEl.style.display = 'block';
      return;
    }

    const entry = {
      id: uid(),
      amount: Math.round(rawAmount),
      shop: shopValue,
      date: dateValue,
      createdAt: new Date().toISOString()
    };

    const submitBtn = form.querySelector('button[type=submit]');
    submitBtn.disabled = true;
    try{
      const latest = await fetchLatest();
      latest.push(entry);
      await persist(latest);
      entries = latest;
      render();
      const firstRow = entriesListEl.firstChild;
      if (firstRow) firstRow.classList.add('new');

      amountInput.value = '';
      shopSelect.value = '';
      customShopInput.value = '';
      customShopField.style.display = 'none';
      dateInput.value = todayStr();
      amountInput.focus();
      syncStatusEl.textContent = 'Synced ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      hideBanner();
    }catch(e){
      showBanner("Couldn't save that to the shared ledger. Check your connection and try again.");
    }
    submitBtn.disabled = false;
  });

  syncBtn.addEventListener('click', () => loadAndRender(true));
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') loadAndRender(false);
  });

  dateInput.value = todayStr();
  loadAndRender(false);
</script>
</body>
</html>
